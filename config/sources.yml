settings:
  freshness_hours: 72
  max_articles_per_day: 24
  top_n: 8
  min_score: 45
  timeout_seconds: 20
  history_file: data/seen_articles.jsonl
  state_file: data/state.json
  site_dir: site
  base_url: ""

sources:
  # =============================
  # MACRO / RÉGULATION / POLITIQUE
  # =============================
  - id: eba
    name: European Banking Authority
    kind: rss
    category: regulation_institutions
    quality: 96
    language: en
    url: https://www.eba.europa.eu/news-press/news/rss.xml
    enabled: true

  - id: ecb_press
    name: ECB - Press
    kind: rss
    category: finance_markets
    quality: 95
    language: en
    url: https://www.ecb.europa.eu/rss/press.html
    enabled: true

  - id: eiopa_media
    name: EIOPA Media
    kind: scrape
    category: assurance
    quality: 96
    language: en
    url: https://www.eiopa.europa.eu/media_en
    enabled: true
    require_url_contains:
      - /20
      - _en
    item_selectors:
      - main article
      - .view-content .views-row
      - .node--type-news
      - article
    title_selectors:
      - h3 a
      - h2 a
      - a
    link_selectors:
      - h3 a
      - h2 a
      - a
    date_selectors:
      - time
      - .date
      - .field--name-field-publication-date
      - span
    summary_selectors:
      - p

  - id: esma_news
    name: ESMA News
    kind: scrape
    category: regulation_institutions
    quality: 95
    language: en
    url: https://www.esma.europa.eu/press-news/esma-news
    enabled: true
    require_url_contains:
      - /press-news/esma-news/
    item_selectors:
      - main article
      - .view-content .views-row
      - .search-results__item
      - article
    title_selectors:
      - h3 a
      - h2 a
      - a
    link_selectors:
      - h3 a
      - h2 a
      - a
    date_selectors:
      - time
      - .date-display-single
      - .field--name-field-publication-date
      - .date
    summary_selectors:
      - p

  - id: amf_regulation_fr
    name: AMF - Réglementation
    kind: rss
    category: regulation_institutions
    quality: 95
    language: fr
    url: https://www.amf-france.org/fr/flux-rss/display/31
