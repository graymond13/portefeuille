  - id: acpr_actualites
    name: ACPR - Actualités
    kind: scrape
    category: assurance
    quality: 93
    language: fr
    url: https://acpr.banque-france.fr/fr/actualites
    enabled: true
    require_url_contains:
      - /fr/
    item_selectors:
      - main article
      - .views-row
      - .card
      - article
    title_selectors:
      - h3 a
      - h2 a
      - a
    link_selectors:
      - h3 a
      - h2 a
      - a
    date_selectors:
      - time
      - .date
      - span
    summary_selectors:
      - p

